<style>

:root {
  --ink: #1a1a1a;
  --paper: #fdfbf6;
  --rule: #c8bfa8;
  --accent: #8b3a2b;
  --muted: #6b6558;
  --max: 720px;
}
* { box-sizing: border-box; }
body {
  font-family: 'Source Serif Pro', 'Noto Serif SC', Georgia, serif;
  font-size: 18px;
  line-height: 1.65;
  color: var(--ink);
  background: var(--paper);
  margin: 0;
  padding: 0;
}
.masthead {
  font-family: 'UnifrakturMaguntia', serif;
  font-weight: 400;
  font-size: 38px;
  color: var(--ink);
  text-align: center;
  letter-spacing: 0.01em;
  line-height: 1;
  border-bottom: 3px double var(--ink);
  padding-bottom: 14px;
  margin-bottom: 32px;
}
.masthead a { color: inherit; text-decoration: none; }

.container { max-width: 720px; margin: 0 auto; padding: 56px 24px 96px; }
.tagline {
  font-family: 'Source Serif Pro', serif;
  color: var(--muted);
  margin-top: 8px;
  margin-bottom: 56px;
  font-size: 17px;
  line-height: 1.6;
  font-style: italic;
}
.issues-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
}
.issue {
  display: block;
  padding: 24px 0;
  border-bottom: 1px solid var(--rule);
  text-decoration: none;
  color: inherit;
  transition: padding-left 0.2s ease;
}
.issue:hover { padding-left: 12px; }
.issue .date {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.issue .title {
  font-family: 'Source Serif Pro', serif;
  font-size: 22px;
  font-weight: 600;
  margin-top: 6px;
  line-height: 1.3;
  letter-spacing: -0.005em;
}
.issue .upshot-preview {
  font-family: 'Source Serif Pro', 'Noto Serif SC', serif;
  font-style: italic;
  color: var(--muted);
  margin-top: 6px;
  font-size: 15px;
  line-height: 1.5;
}
.issue:first-of-type .title { color: var(--accent); }
.footer {
  margin-top: 64px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.footer a { color: var(--muted); }
</style>
</head>
